services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermits
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermits}
      POSTGRES_DB: hermits
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hermits" ]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgres://hermits:${POSTGRES_PASSWORD:-hermits}@db:5432/hermits?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      API_KEY: ${API_KEY:-change-me-in-production}
      BASE_URL: ${BASE_URL:-http://localhost}
      PORT: "8080"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@derangedhermits.com}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
