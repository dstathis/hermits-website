# Docker Compose for running tests with a real PostgreSQL instance.
# Usage: docker compose -f docker-compose.test.yml up -d db && go test ./... ; docker compose -f docker-compose.test.yml down

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hermits_test
      POSTGRES_PASSWORD: hermits_test
      POSTGRES_DB: hermits_test
    ports:
      - "5433:5432"
    volumes:
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hermits_test" ]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
