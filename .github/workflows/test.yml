name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hermits_test
          POSTGRES_PASSWORD: hermits_test
          POSTGRES_DB: hermits_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermits_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        volumes:
          - ${{ github.workspace }}/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U hermits_test && break
            sleep 1
          done

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://hermits_test:hermits_test@localhost:5432/hermits_test?sslmode=disable
        run: go test -v -count=1 -race -p 1 ./...
